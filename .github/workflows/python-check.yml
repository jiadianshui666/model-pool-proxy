name: Python Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  py-compile:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile server
        run: python -m py_compile server.py
